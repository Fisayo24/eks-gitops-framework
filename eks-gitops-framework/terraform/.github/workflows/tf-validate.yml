name: "Terraform DevSecOps Validation"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the Terraform CLI execution environment
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      # 3. Check for proper HCL canonical formatting code styles
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # 4. Initialize working directories to download modules/providers
      - name: Terraform Init
        run: terraform init -backend=false

      # 5. Verify the syntax, block structures, and internal dependencies
      - name: Terraform Validate
        run: terraform validate

  security-scan:
    name: "Security Static Analysis"
    runs-on: ubuntu-latest
    needs: validate # Only runs if linting and validation pass completely

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 6. Run Trivy to scan HCL code for vulnerabilities & security risks
      - name: Run Trivy IAC Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: true
          format: 'table'
          exit-code: '1' # Fails the pipeline if critical/high risks are detected
          severity: 'HIGH,CRITICAL'
