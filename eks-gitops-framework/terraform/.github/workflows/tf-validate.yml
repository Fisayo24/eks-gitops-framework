name: "Terraform DevSecOps Validation"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      # Since your TF files live inside the terraform/ directory, 
      # we point the commands directly to that folder
      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Init
        run: terraform init -backend=false terraform/

      - name: Terraform Validate
        run: terraform validate terraform/

  security-scan:
    name: "Security Static Analysis"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy IAC Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-dir: 'terraform/'
          hide-progress: true
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
